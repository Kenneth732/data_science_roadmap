<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Science Reality Roadmap 2026 – Full Stack Interactive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 2rem 1rem;
            line-height: 1.5;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 3rem;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 1.5rem;
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
            margin-top: 0.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1.5rem;
        }

        .legend {
            display: flex;
            gap: 1.5rem;
            margin: 1.5rem 0 0.5rem;
            flex-wrap: wrap;
            font-size: 0.85rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 4px;
        }

        /* Timeline grid */
        .timeline {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .phase-card {
            background: #1e293b;
            border-radius: 18px;
            padding: 1.5rem;
            border: 1px solid #334155;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .phase-card:hover {
            border-color: #6366f1;
            box-shadow: 0 12px 24px -8px rgba(0,0,0,0.5);
        }

        .phase-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .phase-title {
            font-weight: 600;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .phase-num {
            background: #312e81;
            color: #c7d2fe;
            padding: 0.15rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .time-badges {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 0.75rem;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-weight: 500;
            background: #0f172a;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 0.2rem;
            white-space: nowrap;
        }

        .badge.highlight {
            background: #4338ca;
            color: white;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: #334155;
            border-radius: 6px;
            margin: 1rem 0 0.8rem;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            border-radius: 6px;
            background: linear-gradient(90deg, #6366f1, #a78bfa);
            width: 0%;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 0.8rem;
        }

        .detail-block h4 {
            text-transform: uppercase;
            letter-spacing: 0.03em;
            font-size: 0.7rem;
            color: #818cf8;
            margin-bottom: 0.3rem;
            font-weight: 600;
        }

        .detail-block p {
            font-size: 0.85rem;
            color: #cbd5e1;
            line-height: 1.4;
        }

        .expand-btn {
            background: transparent;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 0.3rem 0.9rem;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: 0.2s;
        }

        .expand-btn:hover {
            background: #1e293b;
            border-color: #6366f1;
            color: #e2e8f0;
        }

        .collapsible-content {
            display: none;
            margin-top: 1rem;
        }

        .collapsible-content.open {
            display: block;
        }

        hr {
            border: 0;
            border-top: 1px solid #2d3748;
            margin: 1rem 0 0.5rem;
        }

        @media (max-width: 600px) {
            .phase-header {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>📋 Data Science Reality Roadmap · 2026</h1>
        <div class="subtitle">
            <span>⚡ Real production stack</span>
            <span>📆 Junior → Expert timelines</span>
            <span>🔍 Click to expand full libraries & tools</span>
        </div>
        <div class="legend">
            <div class="legend-item"><span class="legend-dot" style="background:#4338ca;"></span> Junior months</div>
            <div class="legend-item"><span class="legend-dot" style="background:#0d9488;"></span> Expert years</div>
        </div>
    </header>

    <div class="timeline" id="timeline"></div>
</div>

<script>
    const roadmap = [
        {
            id: 0,
            name: "Computer & Programming Foundations",
            jmonths: "3 – 6 months",
            eyears: "2 – 4 years",
            learn: "CPU/RAM/storage, processes vs threads, networking, CLI, Git, APIs, JSON, HTTP/HTTPS, authentication",
            languages: "Python (main), SQL, basic Bash",
            tools: "CLI, Bash, Zsh, PowerShell (optional)",
            versionControl: "Git, GitHub, GitLab",
            editors: "Visual Studio Code, PyCharm",
            color1: "#4338ca",
            color2: "#0d9488"
        },
        {
            id: 1,
            name: "Programming Fundamentals (Python Deep Dive)",
            jmonths: "4 – 8 months",
            eyears: "3 – 5 years",
            learn: "Variables, loops, functions, OOP, functional, decorators, generators, async, error handling, type hints, testing, packaging",
            libraries: "pathlib, os, sys, datetime, collections, itertools, functools, asyncio, multiprocessing, threading; Testing: pytest, unittest; Formatting: black, flake8, isort, mypy; APIs: requests, httpx; Environment: virtualenv, poetry, pipenv, conda",
            tools: "CLI, Git, VS Code / PyCharm",
            color1: "#4338ca",
            color2: "#0d9488"
        },
        {
            id: 2,
            name: "Frontend Fundamentals",
            jmonths: "2 – 5 months",
            eyears: "2 – 4 years",
            learn: "HTML, CSS, JavaScript basics, APIs, Fetch/AJAX",
            frameworks: "React, Next.js, Tailwind CSS",
            visualization: "Chart.js, D3.js, Plotly.js",
            color1: "#4338ca",
            color2: "#0d9488"
        },
        {
            id: 3,
            name: "Backend Engineering",
            jmonths: "6 – 12 months",
            eyears: "4 – 7 years",
            learn: "REST APIs, Authentication, Authorization, Sessions, JWT, File uploads, Caching, Queues, Rate limiting, WebSockets",
            frameworks: "Django, FastAPI, Flask",
            databases: "SQL: PostgreSQL, MySQL, SQLite; NoSQL: MongoDB, Redis",
            orm: "SQLAlchemy, Django ORM, Tortoise ORM",
            apis: "REST, GraphQL, gRPC",
            color1: "#4338ca",
            color2: "#0d9488"
        },
        {
            id: 4,
            name: "Database & Data Engineering",
            jmonths: "6 – 10 months",
            eyears: "5 – 8 years",
            learn: "Query optimization, ETL, ELT, Warehouses, Streaming, Data lakes, Partitioning, Data modeling",
            sqlMastery: "JOINs, CTEs, Window functions, Indexes, Transactions",
            dataTools: "Snowflake, BigQuery, Redshift; Pipelines: Apache Airflow, Prefect, Luigi; Streaming: Apache Kafka, Spark Streaming; Big Data: Spark, Hadoop; Storage: Parquet, Avro, Delta Lake",
            color1: "#4338ca",
            color2: "#0d9488"
        },
        {
            id: 5,
            name: "Mathematics & Statistics",
            jmonths: "8 – 18 months",
            eyears: "lifelong",
            learn: "Linear Algebra: vectors, matrices, eigenvalues, SVD; Calculus: derivatives, gradients, partial derivatives, optimization; Statistics: probability, distributions, hypothesis testing, Bayesian, regression, confidence intervals",
            libraries: "NumPy, SciPy, statsmodels, scipy.stats, pingouin",
            visualizationLibs: "Matplotlib, Seaborn, Plotly",
            color1: "#4338ca",
            color2: "#0d9488"
        },
        {
            id: 6,
            name: "Data Analysis",
            jmonths: "3 – 6 months",
            eyears: "3 – 5 years",
            learn: "EDA, Cleaning, Missing data, Outliers, Feature engineering",
            libraries: "pandas, polars, NumPy; Visualization: Matplotlib, Seaborn, Plotly; Notebooks: Jupyter, JupyterLab",
            color1: "#4338ca",
            color2: "#0d9488"
        },
        {
            id: 7,
            name: "Machine Learning",
            jmonths: "8 – 18 months",
            eyears: "5 – 10 years",
            learn: "Supervised, unsupervised, bias/variance, cross validation, feature selection, ensembles",
            librariesCore: "scikit-learn, XGBoost, LightGBM, CatBoost; NLP: NLTK, spaCy, Hugging Face Transformers; CV: OpenCV, torchvision, Pillow",
            color1: "#4338ca",
            color2: "#0d9488"
        },
        {
            id: 8,
            name: "Deep Learning",
            jmonths: "6 – 18 months",
            eyears: "5 – 10 years",
            learn: "Neural networks, CNNs, RNNs, Transformers, Attention, Embeddings, Fine-tuning",
            frameworks: "PyTorch, TensorFlow; High-level: Keras, PyTorch Lightning; LLM Stack: Hugging Face, LangChain, LlamaIndex, vLLM",
            color1: "#4338ca",
            color2: "#0d9488"
        },
        {
            id: 9,
            name: "MLOps & Production ML",
            jmonths: "6 – 15 months",
            eyears: "5 – 10 years",
            learn: "Model deployment, Monitoring, CI/CD, Drift detection, Retraining, Experiment tracking",
            tools: "Deployment: Docker, Kubernetes; CI/CD: GitHub Actions, Jenkins, GitLab CI; Experiment: MLflow, W&B; Serving: BentoML, TorchServe, TF Serving; Monitoring: Prometheus, Grafana",
            color1: "#4338ca",
            color2: "#0d9488"
        },
        {
            id: 10,
            name: "Cloud Engineering",
            jmonths: "6 – 12 months",
            eyears: "5 – 10 years",
            learn: "AWS (EC2, S3, Lambda, SageMaker, RDS), GCP (Vertex AI, BigQuery), Azure (Azure ML)",
            color1: "#4338ca",
            color2: "#0d9488"
        },
        {
            id: 11,
            name: "DevOps & Infrastructure",
            jmonths: "4 – 10 months",
            eyears: "5 – 10 years",
            learn: "Linux administration, Networking, Reverse proxies, Load balancing, Containers",
            tools: "Linux, Nginx, Docker, Kubernetes, Terraform, Ansible",
            color1: "#4338ca",
            color2: "#0d9488"
        },
        {
            id: 12,
            name: "Specialization",
            jmonths: "ongoing",
            eyears: "lifelong",
            learn: "Option A: MLE (Ray, Triton, ONNX); Option B: Research Scientist (JAX, CUDA, DeepSpeed); Option C: Data Engineer (dbt, Kafka, Spark); Option D: AI App Engineer (LangGraph, Pinecone, Weaviate, ChromaDB)",
            color1: "#4338ca",
            color2: "#0d9488"
        }
    ];

    const timeline = document.getElementById('timeline');

    roadmap.forEach(phase => {
        const card = document.createElement('div');
        card.className = 'phase-card';

        // Compute progress width (junior months max range) - just visual
        let monthMax = 0;
        if (phase.jmonths !== "ongoing") {
            const parts = phase.jmonths.match(/\d+/g);
            if (parts && parts.length >= 2) monthMax = parseInt(parts[1]); // take high end
            else if (parts) monthMax = parseInt(parts[0]);
        }
        const progressPercent = monthMax > 0 ? Math.min(100, (monthMax / 18) * 100) : 100; // scale against ~18 months max

        card.innerHTML = `
            <div class="phase-header">
                <div class="phase-title">
                    <span class="phase-num">P${phase.id}</span>
                    ${phase.name}
                </div>
                <div class="time-badges">
                    <span class="badge highlight">🟣 Junior: ${phase.jmonths}</span>
                    <span class="badge" style="background:#0f766e;">🟢 Expert: ${phase.eyears}</span>
                </div>
            </div>
            <div class="progress-container">
                <div class="progress-bar" style="width:${progressPercent}%; background: linear-gradient(90deg, ${phase.color1}, ${phase.color2});"></div>
            </div>
            <div class="details-grid">
                <div class="detail-block"><h4>📘 Learn</h4><p>${phase.learn || '—'}</p></div>
                ${phase.languages ? `<div class="detail-block"><h4>💬 Languages</h4><p>${phase.languages}</p></div>` : ''}
                ${phase.libraries || phase.librariesCore ? `<div class="detail-block"><h4>📚 Libraries</h4><p>${phase.libraries || phase.librariesCore || ''}</p></div>` : ''}
                ${phase.frameworks ? `<div class="detail-block"><h4>⚙️ Frameworks</h4><p>${phase.frameworks}</p></div>` : ''}
                ${phase.tools ? `<div class="detail-block"><h4>🛠 Tools</h4><p>${phase.tools}</p></div>` : ''}
                ${phase.sqlMastery ? `<div class="detail-block"><h4>🗄 SQL Mastery</h4><p>${phase.sqlMastery}</p></div>` : ''}
                ${phase.versionControl ? `<div class="detail-block"><h4>🔁 Version Control</h4><p>${phase.versionControl}</p></div>` : ''}
                ${phase.editors ? `<div class="detail-block"><h4>📝 Editors</h4><p>${phase.editors}</p></div>` : ''}
                ${phase.visualization ? `<div class="detail-block"><h4>📊 Visualization</h4><p>${phase.visualization}</p></div>` : ''}
                ${phase.visualizationLibs ? `<div class="detail-block"><h4>📊 Viz Libraries</h4><p>${phase.visualizationLibs}</p></div>` : ''}
                ${phase.dataTools ? `<div class="detail-block"><h4>📦 Data Tools</h4><p>${phase.dataTools}</p></div>` : ''}
                ${phase.apis ? `<div class="detail-block"><h4>🌐 APIs</h4><p>${phase.apis}</p></div>` : ''}
                ${phase.orm ? `<div class="detail-block"><h4>🗃 ORM</h4><p>${phase.orm}</p></div>` : ''}
                ${phase.databases ? `<div class="detail-block"><h4>💾 Databases</h4><p>${phase.databases}</p></div>` : ''}
            </div>
            <hr>
            <button class="expand-btn" onclick="toggleDetails(this)">🔽 Show all details</button>
            <div class="collapsible-content">
                <p style="font-size:0.85rem; color:#94a3b8;"><strong>Everything listed:</strong> ${Object.entries(phase).filter(([k,v])=> !['id','name','jmonths','eyears','color1','color2'].includes(k) && v).map(([k,v])=>`<br><em>${k}:</em> ${v}`).join('')}</p>
            </div>
        `;

        timeline.appendChild(card);
    });

    function toggleDetails(btn) {
        const content = btn.nextElementSibling;
        const isOpen = content.classList.contains('open');
        if (isOpen) {
            content.classList.remove('open');
            btn.textContent = '🔽 Show all details';
        } else {
            content.classList.add('open');
            btn.textContent = '🔼 Hide details';
        }
    }
</script>
</body>
</html>
